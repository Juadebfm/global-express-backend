# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
# Disabled from automatic push triggers because this project deploys via Render.
# Keep manual dispatch only in case Fly deployment is needed in the future.

name: Fly Deploy (Manual Only)
on:
  workflow_dispatch:
jobs:
  deploy:
    name: Deploy app
    runs-on: self-hosted
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Validate Fly token
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "Missing secret: FLY_API_TOKEN"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
