name: Render Keepalive

# Pings the Render health endpoint during Korean business hours to keep
# the free-tier instance warm. Runs on GitHub-hosted runner (ASVS V10.3.1).
#
# Free tier cost: ~21 ubuntu-latest minutes per week × 4.3 weeks/month ≈ 90 min,
# well inside the 2000-min/month GitHub Free quota.

on:
  schedule:
    # Weekdays, 09:00-19:30 Korea Standard Time (KST, UTC+9)
    # GitHub Actions cron uses UTC, so this is 00:00-10:30 UTC, Mon-Fri.
    - cron: "*/30 0-10 * * 1-5"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    name: Ping Render Health Endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate healthcheck URL secret
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "Missing secret: RENDER_HEALTHCHECK_URL"
            echo "Set it to your Render health endpoint, e.g. https://<service>.onrender.com/health"
            exit 1
          fi

      - name: Ping endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          code="$(curl -sS --max-time 30 --retry 2 --retry-delay 2 -o /tmp/health_response.txt -w "%{http_code}" "${HEALTHCHECK_URL}")"
          echo "HTTP ${code}"

          if [ "${code}" -lt 200 ] || [ "${code}" -ge 400 ]; then
            echo "Healthcheck failed. Response body:"
            cat /tmp/health_response.txt
            exit 1
          fi

          echo "Keepalive ping successful."
