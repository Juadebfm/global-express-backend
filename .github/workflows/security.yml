name: Security Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 08:00 UTC even without commits
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Verify package signatures (provenance + integrity)
        # Non-fatal: many maintainers haven't migrated to signed publishes yet,
        # but the report surfaces packages without provenance for review.
        run: npm audit signatures || true

  typecheck-and-test:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
