services:
  - type: web
    name: global-express-backend
    env: node
    rootDir: .
    autoDeploy: true
    buildCommand: npm ci && npm run build
    # Gate every deploy on the secret hygiene audit (placeholder values,
    # test-key prefixes in prod, sample-env collisions). Database migrations
    # use the project-owned ledger via `npm run db:migrate`; baseline existing
    # environments manually before enabling automatic migration deployment.
    preDeployCommand: npm run audit:secrets:prod
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false
      - key: TERMII_CHANNEL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_IP_WHITELIST
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

      # ─── Cloudflare Turnstile CAPTCHA ───────────────────────────────────
      # Get from: https://dash.cloudflare.com/?to=/:account/turnstile
      # Wired to public mutation endpoints (newsletter, gallery claims, D2D).
      - key: TURNSTILE_SECRET_KEY
        sync: false

      # ─── VirusTotal AV scanning ─────────────────────────────────────────
      # Get from: https://www.virustotal.com/gui/my-apikey
      # Scans every confirmed upload (receipts, claim proofs, attachments).
      - key: VIRUSTOTAL_API_KEY
        sync: false

      # ─── OpenTelemetry tracing (optional) ───────────────────────────────
      # Leave unset to disable. Typical values:
      #   OTEL_EXPORTER_OTLP_ENDPOINT=https://api.honeycomb.io/v1/traces
      #   OTEL_SERVICE_NAME=global-express-backend
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_SERVICE_NAME
        sync: false

  # ─── Staging service ────────────────────────────────────────────────────────
  # Mirrors production config but targets the `staging` branch.
  # autoDeploy is off — trigger manually from the Render dashboard or via
  # `render deploy` after running migrations against the staging DB.
  - type: web
    name: global-express-backend-staging
    env: node
    rootDir: .
    branch: staging
    autoDeploy: false
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
